const PARTY_STYLE = {
  '더불어민주당': 'background:#E8F0FA;color:#0056A2;',
  '국민의힘':     'background:#FDE8E9;color:#C9151E;',
  '개혁신당':     'background:#FFF0E6;color:#C44F00;',
  '진보당':       'background:#FDEAEA;color:#D4000F;',
  '자유와혁신':   'background:#EEE9FF;color:#5B3FD4;',
  '무소속':       'background:#F3F4F6;color:#4B5563;',
};

let newsFilter = 'all';

function setNewsFilter(v) {
  newsFilter = v;
  document.getElementById('chip-all').style.cssText  = v==='all'  ? 'background:#1A3A5C;color:white;' : '';
  document.getElementById('chip-news').classList.toggle('active', v==='news');
  document.getElementById('chip-none').classList.toggle('active', v==='none');
  applyFilters();
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderRow(d) {
  const pStyle = PARTY_STYLE[d.party] || 'background:#F3F4F6;color:#374151;';
  const dot = d.has_news
    ? '<span class="dot-news"></span>'
    : '<span class="dot-none"></span>';
  const newsCell = d.has_news
    ? `<div class="news-title">${dot}${escHtml(d.title)}</div>
       <a class="news-link" href="${escHtml(d.link)}" target="_blank" rel="noopener">기사 보기 ↗</a>`
    : `<span class="no-news-tag">${dot}뉴스 없음</span>`;

  return `<tr>
    <td style="text-align:center;"><span class="no-badge">${escHtml(d.no)||'–'}</span></td>
    <td><div style="font-weight:600;font-size:12px;">${escHtml(d.city)}</div><div class="sgg-text">${escHtml(d.sgg)}</div></td>
    <td style="font-weight:700;white-space:nowrap;">${escHtml(d.name)}<br><span style="font-size:11px;color:#9CA3AF;font-weight:400;">${escHtml(d.name_full.replace(d.name,'').replace(/[()]/g,''))}</span></td>
    <td><span class="party-badge" style="${pStyle}">${escHtml(d.party)}</span></td>
    <td>${newsCell}</td>
    <td style="text-align:center;" class="news-date">${escHtml(d.date)}</td>
  </tr>`;
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const city = document.getElementById('citySelect').value;
  const party = document.getElementById('partySelect').value;

  const filtered = RAW.filter(d => {
    if (city && d.city !== city) return false;
    if (party && d.party !== party) return false;
    if (newsFilter === 'news' && !d.has_news) return false;
    if (newsFilter === 'none' && d.has_news) return false;
    if (q) {
      const hay = (d.name + d.sgg + d.city + d.party).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = filtered.map(renderRow).join('');
  document.getElementById('resultCount').textContent = `${filtered.length}명 표시 중`;
  document.getElementById('emptyMsg').style.display = filtered.length ? 'none' : 'block';
  document.getElementById('mainTable').style.display = filtered.length ? '' : 'none';
}

// 초기 렌더링
applyFilters();
</script>
