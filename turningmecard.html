<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>터닝메카드 식별기 | 캐릭터 이름 & 중고가 조회</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "맑은 고딕", "Malgun Gothic", sans-serif; background: #0D1B2A; color: #E0E6F0; min-height: 100vh; }

.header {
  background: linear-gradient(135deg, #0D1B2A 0%, #1A2E4A 50%, #0D1B2A 100%);
  border-bottom: 2px solid #FF4E00;
  padding: 24px 32px;
  display: flex; align-items: center; gap: 16px;
}
.header-logo { font-size: 36px; }
.header h1 { font-size: 22px; font-weight: 800; color: #FF6B1A; letter-spacing: -0.5px; }
.header p { font-size: 13px; color: #8899AA; margin-top: 3px; }

.container { max-width: 860px; margin: 0 auto; padding: 32px 20px; }

/* 업로드 영역 */
.upload-section { margin-bottom: 28px; }
.upload-area {
  border: 3px dashed #2A4A6A;
  border-radius: 20px;
  padding: 48px 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
  background: #0A1525;
}
.upload-area:hover, .upload-area.drag-over {
  border-color: #FF6B1A;
  background: #0F1E32;
  box-shadow: 0 0 30px rgba(255, 107, 26, 0.12);
}
.upload-icon { font-size: 56px; margin-bottom: 16px; display: block; }
.upload-area h2 { font-size: 18px; font-weight: 700; color: #C0D0E0; margin-bottom: 8px; }
.upload-area p { font-size: 13px; color: #5A7A9A; }
.upload-area input[type="file"] { display: none; }

.btn-row { display: flex; gap: 12px; justify-content: center; margin-top: 20px; }
.btn {
  padding: 11px 24px; border-radius: 10px; font-size: 14px; font-weight: 700;
  cursor: pointer; border: none; display: flex; align-items: center; gap: 8px;
  transition: all 0.2s; font-family: inherit;
}
.btn-primary { background: #FF6B1A; color: white; }
.btn-primary:hover { background: #FF8A40; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(255,107,26,0.4); }
.btn-secondary { background: #1A3A5A; color: #90B4D0; border: 1.5px solid #2A5A8A; }
.btn-secondary:hover { background: #1E4A70; color: #C0D8F0; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* 미리보기 */
.preview-wrap {
  display: none;
  border-radius: 16px;
  overflow: hidden;
  background: #0A1525;
  border: 2px solid #1A3A5A;
}
.preview-wrap img {
  width: 100%;
  max-height: 360px;
  object-fit: contain;
  display: block;
  background: #060E1A;
}
.preview-actions {
  display: flex; gap: 10px; padding: 14px 16px;
  border-top: 1px solid #1A3A5A;
  align-items: center;
}
.preview-filename { font-size: 12px; color: #5A7A9A; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.btn-analyze {
  padding: 11px 28px; background: linear-gradient(135deg, #FF6B1A, #FF4E00);
  color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 800;
  cursor: pointer; font-family: inherit; letter-spacing: 0.5px;
  box-shadow: 0 4px 16px rgba(255, 80, 0, 0.35);
  transition: all 0.2s;
}
.btn-analyze:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(255, 80, 0, 0.5); }
.btn-analyze:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* 로딩 */
.loading {
  display: none;
  text-align: center;
  padding: 40px;
  background: #0A1525;
  border-radius: 16px;
  border: 2px solid #1A3A5A;
}
.spinner {
  width: 48px; height: 48px;
  border: 4px solid #1A3A5A;
  border-top-color: #FF6B1A;
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading p { color: #7A9AB8; font-size: 14px; }

/* 결과 */
.result-section { display: none; }

.character-card {
  background: linear-gradient(135deg, #0F1E35, #152840);
  border: 2px solid #FF6B1A;
  border-radius: 20px;
  padding: 28px;
  margin-bottom: 20px;
  box-shadow: 0 0 40px rgba(255, 107, 26, 0.12);
  position: relative;
  overflow: hidden;
}
.character-card::before {
  content: '';
  position: absolute; top: 0; right: 0;
  width: 120px; height: 120px;
  background: radial-gradient(circle at top right, rgba(255,107,26,0.15), transparent 70%);
}
.char-label { font-size: 11px; font-weight: 700; color: #FF6B1A; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
.char-name { font-size: 36px; font-weight: 900; color: #FFF; letter-spacing: -1px; margin-bottom: 6px; }
.char-series { font-size: 14px; color: #6A8AAA; }
.char-badge {
  display: inline-block; padding: 4px 12px; border-radius: 20px;
  font-size: 11px; font-weight: 700; background: rgba(255,107,26,0.2);
  color: #FF9050; border: 1px solid rgba(255,107,26,0.3); margin-top: 10px;
}
.confidence-bar {
  margin-top: 16px;
}
.confidence-label { font-size: 11px; color: #5A7A9A; margin-bottom: 6px; display: flex; justify-content: space-between; }
.confidence-track { height: 6px; background: #1A3A5A; border-radius: 3px; }
.confidence-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #FF6B1A, #FFB060); transition: width 0.6s ease; }

/* 가격 섹션 */
.price-section-title {
  font-size: 15px; font-weight: 700; color: #90B0D0; margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
}
.price-section-title span { font-size: 18px; }

.price-cards { display: grid; gap: 10px; }
.price-card {
  background: #0A1525;
  border: 1.5px solid #1A3A5A;
  border-radius: 12px;
  padding: 14px 16px;
  display: flex; align-items: center; gap: 14px;
  transition: border-color 0.2s, background 0.2s;
  text-decoration: none;
  cursor: pointer;
}
.price-card:hover { border-color: #2A6AAA; background: #0D1E34; }
.price-thumb {
  width: 60px; height: 60px; border-radius: 8px;
  object-fit: contain; background: #060E1A; flex-shrink: 0;
}
.price-thumb-placeholder {
  width: 60px; height: 60px; border-radius: 8px;
  background: #0F1E32; flex-shrink: 0; display: flex;
  align-items: center; justify-content: center; font-size: 24px;
}
.price-info { flex: 1; min-width: 0; }
.price-title {
  font-size: 13px; color: #B0C8E0; line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.price-title b { color: #FFD080; font-weight: normal; }
.price-amount { font-size: 18px; font-weight: 800; color: #FF9050; margin-top: 4px; }
.price-amount span { font-size: 12px; color: #5A7A9A; font-weight: 400; }
.price-link-icon { color: #3A6A9A; font-size: 16px; flex-shrink: 0; }

.no-price {
  background: #0A1525; border: 1.5px dashed #1A3A5A; border-radius: 12px;
  padding: 24px; text-align: center; color: #3A5A7A; font-size: 13px;
}

/* 설정 패널 */
.settings-panel {
  background: #0A1525; border: 1.5px solid #1A3A5A;
  border-radius: 14px; padding: 20px; margin-bottom: 24px;
}
.settings-title { font-size: 13px; font-weight: 700; color: #6A8AAA; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
.form-row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
.form-group { flex: 1; min-width: 180px; }
.form-group label { font-size: 11px; color: #5A7A9A; display: block; margin-bottom: 6px; font-weight: 600; }
.form-group input {
  width: 100%; padding: 9px 12px; background: #060E1A; border: 1.5px solid #1A3A5A;
  border-radius: 8px; color: #C0D8F0; font-size: 13px; font-family: monospace;
  outline: none; transition: border-color 0.2s;
}
.form-group input:focus { border-color: #FF6B1A; }
.btn-save { padding: 9px 18px; background: #1A3A5A; color: #90B4D0; border: 1.5px solid #2A5A8A; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; white-space: nowrap; }
.btn-save:hover { background: #1E4A70; }
.api-status { font-size: 11px; margin-top: 8px; }
.api-status.ok { color: #34D399; }
.api-status.missing { color: #FCA5A5; }

/* 에러 */
.error-box {
  background: rgba(220, 50, 50, 0.1); border: 1.5px solid rgba(220, 80, 80, 0.35);
  border-radius: 12px; padding: 16px 20px; color: #FCA5A5; font-size: 14px;
  display: none;
}

/* 카메라 */
.camera-section { display: none; }
.camera-video {
  width: 100%; border-radius: 14px; background: #000;
  max-height: 360px; object-fit: cover; display: block;
}
.camera-controls { display: flex; gap: 10px; margin-top: 12px; justify-content: center; }
#captureBtn { background: white; border: none; border-radius: 50%; width: 64px; height: 64px; font-size: 28px; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.4); transition: transform 0.1s; }
#captureBtn:active { transform: scale(0.92); }

.tab-row { display: flex; gap: 6px; margin-bottom: 20px; }
.tab {
  padding: 9px 20px; border-radius: 10px; font-size: 13px; font-weight: 700;
  cursor: pointer; border: 1.5px solid #1A3A5A; background: transparent; color: #5A7A9A;
  font-family: inherit; transition: all 0.2s;
}
.tab.active { background: #FF6B1A; color: white; border-color: #FF6B1A; }

canvas { display: none; }

.footer { text-align: center; padding: 32px 20px; color: #2A4A6A; font-size: 12px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">🤖</div>
  <div>
    <h1>터닝메카드 식별기</h1>
    <p>사진을 업로드하면 캐릭터 이름과 중고 판매가격을 알려드립니다</p>
  </div>
</div>

<div class="container">

  <!-- API 설정 -->
  <div class="settings-panel">
    <div class="settings-title">⚙️ API 설정 <span style="font-size:11px;font-weight:400;color:#3A5A7A;">(최초 1회 입력 후 자동 저장)</span></div>
    <div class="form-row">
      <div class="form-group">
        <label>ANTHROPIC API KEY</label>
        <input type="password" id="anthropicKey" placeholder="sk-ant-...">
      </div>
      <div class="form-group">
        <label>NAVER CLIENT ID <span style="color:#3A5A7A;">(선택)</span></label>
        <input type="text" id="naverClientId" placeholder="Naver Client ID">
      </div>
      <div class="form-group">
        <label>NAVER CLIENT SECRET <span style="color:#3A5A7A;">(선택)</span></label>
        <input type="password" id="naverClientSecret" placeholder="Naver Client Secret">
      </div>
      <button class="btn-save" onclick="saveSettings()">저장</button>
    </div>
    <div class="api-status" id="apiStatus"></div>
  </div>

  <!-- 입력 탭 -->
  <div class="tab-row">
    <button class="tab active" id="tabFile" onclick="switchTab('file')">📁 파일 업로드</button>
    <button class="tab" id="tabCamera" onclick="switchTab('camera')">📷 카메라 촬영</button>
  </div>

  <!-- 파일 업로드 탭 -->
  <div id="fileSection">
    <div class="upload-section">
      <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()"
           ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)">
        <span class="upload-icon">📸</span>
        <h2>터닝메카드 사진을 올려주세요</h2>
        <p>클릭하거나 파일을 여기에 끌어다 놓으세요</p>
        <p style="margin-top:8px;font-size:12px;color:#3A5A7A;">JPG, PNG, WEBP 지원 · 최대 10MB</p>
        <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)">
        <div class="btn-row" style="margin-top:24px;" onclick="event.stopPropagation()">
          <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">📁 파일 선택</button>
        </div>
      </div>
    </div>

    <div class="preview-wrap" id="previewWrap">
      <img id="previewImg" src="" alt="미리보기">
      <div class="preview-actions">
        <span class="preview-filename" id="previewFilename"></span>
        <button class="btn btn-secondary" onclick="resetUpload()" style="font-size:12px;padding:8px 14px;">✕ 다시 선택</button>
        <button class="btn-analyze" id="analyzeBtn" onclick="analyze()">🔍 캐릭터 식별하기</button>
      </div>
    </div>
  </div>

  <!-- 카메라 탭 -->
  <div id="cameraSection" class="camera-section">
    <video id="cameraVideo" class="camera-video" autoplay playsinline muted></video>
    <canvas id="cameraCanvas"></canvas>
    <div class="camera-controls">
      <button class="btn btn-secondary" onclick="stopCamera()">✕ 취소</button>
      <button id="captureBtn" onclick="capturePhoto()" title="촬영">📷</button>
    </div>
  </div>

  <!-- 로딩 -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p id="loadingMsg">AI가 터닝메카드를 분석하고 있어요...</p>
  </div>

  <!-- 에러 -->
  <div class="error-box" id="errorBox"></div>

  <!-- 결과 -->
  <div class="result-section" id="resultSection">
    <div class="character-card" id="characterCard">
      <div class="char-label">🤖 식별된 캐릭터</div>
      <div class="char-name" id="charName">-</div>
      <div class="char-series" id="charDesc"></div>
      <div class="char-badge" id="charBadge">터닝메카드</div>
      <div class="confidence-bar" id="confidenceBar">
        <div class="confidence-label">
          <span>인식 신뢰도</span>
          <span id="confidenceText">-</span>
        </div>
        <div class="confidence-track">
          <div class="confidence-fill" id="confidenceFill" style="width:0%"></div>
        </div>
      </div>
    </div>

    <div class="price-section-title"><span>🛒</span> 중고 판매가 조회 (네이버 쇼핑)</div>
    <div class="price-cards" id="priceCards"></div>
  </div>

</div>

<div class="footer">터닝메카드 식별기 · AI 기반 캐릭터 인식 & 중고가 조회</div>

<script>
// ── 설정 관리 ──────────────────────────────────────────────
function loadSettings() {
  document.getElementById('anthropicKey').value = localStorage.getItem('tmk_anthropic') || '';
  document.getElementById('naverClientId').value = localStorage.getItem('tmk_naver_id') || '';
  document.getElementById('naverClientSecret').value = localStorage.getItem('tmk_naver_secret') || '';
  updateApiStatus();
}

function saveSettings() {
  localStorage.setItem('tmk_anthropic', document.getElementById('anthropicKey').value.trim());
  localStorage.setItem('tmk_naver_id', document.getElementById('naverClientId').value.trim());
  localStorage.setItem('tmk_naver_secret', document.getElementById('naverClientSecret').value.trim());
  updateApiStatus();
  const btn = document.querySelector('.btn-save');
  btn.textContent = '✓ 저장됨';
  setTimeout(() => btn.textContent = '저장', 1500);
}

function updateApiStatus() {
  const key = localStorage.getItem('tmk_anthropic') || '';
  const status = document.getElementById('apiStatus');
  if (key.startsWith('sk-ant-')) {
    status.className = 'api-status ok';
    status.textContent = '✓ Anthropic API 키 설정됨';
  } else if (key) {
    status.className = 'api-status missing';
    status.textContent = '⚠ API 키 형식을 확인해주세요 (sk-ant- 로 시작해야 합니다)';
  } else {
    status.className = 'api-status missing';
    status.textContent = '⚠ Anthropic API 키를 입력해주세요';
  }
}

// ── 탭 전환 ──────────────────────────────────────────────
let cameraStream = null;

function switchTab(tab) {
  document.getElementById('tabFile').classList.toggle('active', tab === 'file');
  document.getElementById('tabCamera').classList.toggle('active', tab === 'camera');
  document.getElementById('fileSection').style.display = tab === 'file' ? '' : 'none';
  document.getElementById('cameraSection').style.display = tab === 'camera' ? '' : 'none';
  if (tab === 'camera') startCamera();
  else stopCamera();
}

async function startCamera() {
  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    document.getElementById('cameraVideo').srcObject = cameraStream;
    document.getElementById('cameraSection').style.display = '';
  } catch (e) {
    showError('카메라를 사용할 수 없습니다: ' + e.message);
  }
}

function stopCamera() {
  if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
}

function capturePhoto() {
  const video = document.getElementById('cameraVideo');
  const canvas = document.getElementById('cameraCanvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  canvas.toBlob(blob => {
    const file = new File([blob], 'camera-capture.jpg', { type: 'image/jpeg' });
    setFile(file);
    switchTab('file');
  }, 'image/jpeg', 0.92);
}

// ── 파일 처리 ──────────────────────────────────────────────
let currentFile = null;

function handleFileSelect(e) { if (e.target.files[0]) setFile(e.target.files[0]); }

function handleDragOver(e) { e.preventDefault(); document.getElementById('dropZone').classList.add('drag-over'); }
function handleDragLeave() { document.getElementById('dropZone').classList.remove('drag-over'); }
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('drag-over');
  if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
}

function setFile(file) {
  if (!file.type.startsWith('image/')) { showError('이미지 파일만 업로드 가능합니다.'); return; }
  if (file.size > 10 * 1024 * 1024) { showError('파일 크기는 10MB 이하여야 합니다.'); return; }
  currentFile = file;
  hideError();
  hideResult();
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('previewImg').src = e.target.result;
    document.getElementById('previewFilename').textContent = file.name + ' (' + (file.size/1024).toFixed(0) + 'KB)';
    document.getElementById('previewWrap').style.display = '';
    document.getElementById('dropZone').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

function resetUpload() {
  currentFile = null;
  document.getElementById('fileInput').value = '';
  document.getElementById('previewWrap').style.display = 'none';
  document.getElementById('dropZone').style.display = '';
  hideResult();
  hideError();
}

// ── AI 분석 ──────────────────────────────────────────────
async function analyze() {
  const apiKey = localStorage.getItem('tmk_anthropic') || '';
  if (!apiKey) { showError('Anthropic API 키를 먼저 입력해주세요.'); return; }
  if (!currentFile) { showError('이미지를 먼저 업로드해주세요.'); return; }

  document.getElementById('analyzeBtn').disabled = true;
  showLoading('AI가 터닝메카드를 분석하고 있어요...');
  hideResult();
  hideError();

  try {
    // 이미지를 base64로 변환
    const base64 = await fileToBase64(currentFile);
    const mediaType = currentFile.type || 'image/jpeg';

    // Claude API 호출
    const claudeRes = await callClaude(apiKey, base64, mediaType);

    setLoadingMsg('중고 가격 정보를 검색하고 있어요...');

    // 가격 검색
    const naverId = localStorage.getItem('tmk_naver_id') || '';
    const naverSecret = localStorage.getItem('tmk_naver_secret') || '';
    let prices = [];
    if (naverId && naverSecret && claudeRes.character !== '알 수 없음') {
      prices = await searchNaverPrices(naverId, naverSecret, claudeRes.character);
    }

    showResult(claudeRes, prices);
  } catch (e) {
    showError('오류가 발생했습니다: ' + e.message);
  } finally {
    document.getElementById('analyzeBtn').disabled = false;
    hideLoading();
  }
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function callClaude(apiKey, base64, mediaType) {
  const prompt = `이 이미지를 분석해서 터닝메카드 캐릭터를 식별해주세요.

다음 JSON 형식으로만 답하세요 (다른 텍스트 없이):
{
  "character": "캐릭터 이름 (한국어)",
  "confidence": 85,
  "series": "시리즈명 (예: 터닝메카드W, 터닝메카드R 등)",
  "description": "캐릭터 특징 한 줄 설명",
  "is_turningmecard": true
}

만약 터닝메카드가 아니거나 식별 불가능한 경우:
{
  "character": "알 수 없음",
  "confidence": 0,
  "series": "",
  "description": "터닝메카드 캐릭터를 찾을 수 없습니다",
  "is_turningmecard": false
}

터닝메카드 주요 캐릭터 참고: 에반, 메가트론, 알키오네, 다크론, 케이론, 샤크론, 타이탄, 스카이론, 불카누스, 기간토론, 블래스론, 에일론, 윙드론, 네오알키오네, 제트론, 스팅론, 스핀킥론, 레오론, 호크론, 울프론 등`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-calls': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 512,
      messages: [{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
          { type: 'text', text: prompt }
        ]
      }]
    })
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err.error?.message || `API 오류 (${response.status})`);
  }

  const data = await response.json();
  const text = data.content[0].text.trim();

  // JSON 파싱
  const jsonMatch = text.match(/\{[\s\S]*\}/);
  if (!jsonMatch) throw new Error('AI 응답을 파싱할 수 없습니다');
  return JSON.parse(jsonMatch[0]);
}

async function searchNaverPrices(clientId, clientSecret, characterName) {
  const query = encodeURIComponent(`터닝메카드 ${characterName} 중고`);
  // CORS 문제로 인해 Naver API는 직접 호출 불가 → 프록시 또는 서버 필요
  // 아래는 CORS 허용 시나리오 (로컬 백엔드 사용 권장)
  try {
    const resp = await fetch(`/api/naver-price?query=${query}&clientId=${clientId}&clientSecret=${clientSecret}`);
    if (!resp.ok) return [];
    return await resp.json();
  } catch {
    return [];
  }
}

// ── 결과 표시 ──────────────────────────────────────────────
function showResult(claudeRes, prices) {
  const section = document.getElementById('resultSection');
  const charName = document.getElementById('charName');
  const charDesc = document.getElementById('charDesc');
  const charBadge = document.getElementById('charBadge');
  const confidenceText = document.getElementById('confidenceText');
  const confidenceFill = document.getElementById('confidenceFill');
  const priceCards = document.getElementById('priceCards');

  charName.textContent = claudeRes.character || '알 수 없음';
  charDesc.textContent = claudeRes.description || '';
  charBadge.textContent = claudeRes.series || '터닝메카드';

  const conf = claudeRes.confidence || 0;
  confidenceText.textContent = conf + '%';
  setTimeout(() => confidenceFill.style.width = conf + '%', 100);

  if (!claudeRes.is_turningmecard) {
    document.getElementById('characterCard').style.borderColor = '#3A5A7A';
  }

  // 가격 카드
  priceCards.innerHTML = '';
  if (prices && prices.length > 0) {
    prices.forEach(p => {
      const card = document.createElement('a');
      card.className = 'price-card';
      card.href = p.link || '#';
      card.target = '_blank';
      card.rel = 'noopener noreferrer';

      const price = parseInt(p.lprice || p.price || 0).toLocaleString();
      const title = (p.title || '').replace(/<\/?b>/g, '<b>').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&');

      card.innerHTML = `
        ${p.image ? `<img class="price-thumb" src="${p.image}" alt="" onerror="this.style.display='none'">` : `<div class="price-thumb-placeholder">🛒</div>`}
        <div class="price-info">
          <div class="price-title">${title}</div>
          <div class="price-amount">${price}<span>원</span></div>
        </div>
        <div class="price-link-icon">↗</div>
      `;
      priceCards.appendChild(card);
    });
  } else {
    priceCards.innerHTML = `
      <div class="no-price">
        ${prices === null ? '⚠ 네이버 API 키를 설정하면 중고 가격을 조회할 수 있습니다' : '검색된 중고 매물이 없습니다'}
        <br><br>
        <a href="https://search.shopping.naver.com/search/all?query=${encodeURIComponent('터닝메카드 ' + (claudeRes.character||'') + ' 중고')}" target="_blank" rel="noopener noreferrer" style="color:#4A8AC0;font-size:13px;">
          → 네이버 쇼핑에서 직접 검색하기
        </a>
      </div>
    `;
  }

  section.style.display = '';
}

function hideResult() { document.getElementById('resultSection').style.display = 'none'; }

// ── UI 헬퍼 ──────────────────────────────────────────────
function showLoading(msg) {
  document.getElementById('loadingMsg').textContent = msg;
  document.getElementById('loading').style.display = '';
}
function setLoadingMsg(msg) { document.getElementById('loadingMsg').textContent = msg; }
function hideLoading() { document.getElementById('loading').style.display = 'none'; }
function showError(msg) { const b = document.getElementById('errorBox'); b.textContent = '⚠ ' + msg; b.style.display = ''; }
function hideError() { document.getElementById('errorBox').style.display = 'none'; }

// ── 초기화 ──────────────────────────────────────────────
loadSettings();
switchTab('file');
